name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  DOTNET_VERSION: "10.0.x"
  PROJECT: src/desktop_app/desktop_app.csproj

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: PlayStatus-win-x64
          - os: macos-latest
            rid: osx-x64
            artifact: PlayStatus-osx-x64
          - os: macos-latest
            rid: osx-arm64
            artifact: PlayStatus-osx-arm64

    name: Build (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set version
        id: version
        shell: bash
        run: |
          VERSION="$(date -u +'%Y.%-m').${{ github.run_number }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Publish
        run: >
          dotnet publish ${{ env.PROJECT }}
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.version.outputs.version }}
          --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ./publish/
          retention-days: 30

  release:
    name: Create Release
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set version tag
        shell: bash
        run: |
          VERSION="$(date -u +'%Y.%-m').${{ github.run_number }}"
          echo "TAG_NAME=v${VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=Build ${VERSION}" >> "$GITHUB_ENV"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Zip artifacts
        shell: bash
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            zip -r "../${name}.zip" "$dir"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          generate_release_notes: true
          files: "*.zip"
